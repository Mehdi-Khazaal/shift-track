name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'shifttrack-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/repo
            git pull origin main
            cp -r shifttrack-api/* /var/www/shifttrack-api/
            cd /var/www/shifttrack-api
            npm install --production
            pm2 restart shifttrack-api
