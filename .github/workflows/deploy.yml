name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'shifttrack-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/repo
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/repo/shifttrack-api
            npm install --omit=dev
            pm2 restart shifttrack-api
            sleep 5
            curl -sf "http://localhost:3000/health" | grep '"ok":true' || (echo "Health check failed" && exit 1)
