name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'shifttrack-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/repo
            git fetch origin main
            git reset --hard origin/main
            cd /var/www/repo/shifttrack-api
            npm install --omit=dev
            pm2 restart shifttrack-api
            for i in 1 2 3 4 5 6; do
              sleep 5
              result=$(curl -sf "http://localhost:3000/health" 2>/dev/null || true)
              echo "$result" | grep -q '"ok":true' && echo "Health check passed" && break
              echo "Attempt $i/6 failed, retrying..."
              if [ "$i" = "6" ]; then echo "Health check failed" && exit 1; fi
            done
